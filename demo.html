<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#121829">
<title>세차 플래너</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="세차 플래너">
<meta name="description" content="세차 세션 계획·실행·복기 + 케미컬/장비 인벤토리 관리">
<script>window.DEMO_MODE = true;</script>
<style>
:root{
  --bg:#121829; --bg2:#1a2236;
  --surface:rgba(36,46,72,.72); --surface-solid:#222c44;
  --surface2:rgba(46,58,88,.62); --surface2-solid:#2b3754;
  --line:rgba(130,150,200,.20); --line2:rgba(130,150,200,.34);
  --txt:#eef2fb; --txt2:#9fabc7; --txt3:#6b7798;
  --c1:#22d3ee; --c2:#7c5cff; --c3:#b14dff;
  --accent:#3fd7e6; --accent-ink:#03171c;
  --gold:#e0b352;
  --good:#34e0a1; --warn:#f5b945; --bad:#ff5d6c;
  --grad:linear-gradient(120deg,#22d3ee 0%,#5b8cff 48%,#b14dff 100%);
  --grad-soft:linear-gradient(120deg,rgba(34,211,238,.16),rgba(177,77,255,.16));
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  font-size:16px;line-height:1.45;overscroll-behavior-y:none}
body{padding-bottom:80px;background:var(--bg);
  background-image:
    radial-gradient(900px 500px at 8% -8%,rgba(34,211,238,.20),transparent 60%),
    radial-gradient(900px 600px at 108% 4%,rgba(177,77,255,.20),transparent 60%),
    radial-gradient(700px 500px at 50% 108%,rgba(91,140,255,.10),transparent 60%);
  background-attachment:fixed}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
.hidden{display:none!important}
::selection{background:rgba(124,92,255,.4)}

header{position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg,rgba(18,24,41,.92),rgba(18,24,41,.6));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
  padding:15px 16px 13px;display:flex;align-items:center;gap:10px}
header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:-.2px;flex:1}
header h1 .dot{
  background:var(--grad);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent}
.hbtn{width:40px;height:40px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--line);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;font-size:19px;flex:none}
.hbtn:active{transform:scale(.94)}

main{padding:18px 16px;max-width:680px;margin:0 auto}

nav{position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:linear-gradient(0deg,rgba(18,24,41,.96),rgba(18,24,41,.68));
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--line);
  display:flex;padding:8px 2px calc(8px + env(safe-area-inset-bottom))}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 0;color:var(--txt3);font-size:10.5px;font-weight:700;
  position:relative;transition:color .2s}
nav button .ic{font-size:21px;line-height:1;transition:transform .2s}
nav button.on{color:var(--txt)}
nav button.on .ic{transform:translateY(-1px)}
nav button.on::before{content:"";position:absolute;top:-8px;width:26px;height:3px;
  border-radius:3px;background:var(--grad);box-shadow:0 0 12px rgba(91,140,255,.7)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:17px;margin-bottom:13px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 8px 28px rgba(2,5,16,.45),inset 0 1px 0 rgba(255,255,255,.05)}
.card.tap{transition:transform .1s,border-color .2s}
.card.tap:active{transform:scale(.987);border-color:var(--line2)}
.row{display:flex;align-items:center;gap:12px}
.between{justify-content:space-between}
.grow{flex:1;min-width:0}
.muted{color:var(--txt2);font-size:14px}
.tiny{color:var(--txt3);font-size:12px}
.ellip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sectit{font-size:12px;font-weight:800;color:var(--txt3);text-transform:uppercase;
  letter-spacing:1.4px;margin:6px 2px 11px}

.btn{background:var(--grad);color:#fff;font-weight:800;padding:14px 16px;
  border-radius:13px;font-size:15px;display:inline-flex;align-items:center;
  justify-content:center;gap:7px;width:100%;letter-spacing:.2px;
  box-shadow:0 6px 20px rgba(91,140,255,.32),inset 0 1px 0 rgba(255,255,255,.25)}
.btn:active{filter:brightness(.95);transform:translateY(1px)}
.btn.ghost{background:var(--surface2);color:var(--txt);border:1px solid var(--line);box-shadow:none}
.btn.ghost:active{background:var(--surface2-solid)}
.btn.sm{padding:10px 14px;font-size:14px;width:auto;border-radius:11px}
.btn.danger{background:linear-gradient(120deg,#ff5d6c,#ff7a3d);color:#fff}

.fab{position:fixed;right:18px;bottom:calc(82px + env(safe-area-inset-bottom));z-index:25;
  width:60px;height:60px;border-radius:50%;background:var(--grad);color:#fff;
  font-size:30px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 30px rgba(124,92,255,.5),inset 0 1px 0 rgba(255,255,255,.3);font-weight:300}
.fab:active{transform:scale(.92)}

label.fl{display:block;font-size:13px;color:var(--txt2);margin:15px 0 7px;font-weight:700}
.inp{width:100%;background:var(--surface2-solid);border:1px solid var(--line);color:var(--txt);
  padding:13px;border-radius:12px;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:transparent;box-shadow:0 0 0 1.5px var(--c1),0 0 18px rgba(34,211,238,.25)}
textarea.inp{resize:vertical;min-height:64px}

.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--surface2);border:1px solid var(--line);color:var(--txt2);
  padding:7px 12px;border-radius:22px;font-size:13px;font-weight:700;transition:all .15s}
.chip.on{background:var(--grad);color:#fff;border-color:transparent;
  box-shadow:0 4px 14px rgba(91,140,255,.4)}
.chip.tag{background:rgba(224,179,82,.12);border-color:rgba(224,179,82,.32);color:var(--gold)}
.chip.sm{padding:4px 10px;font-size:12px}

.scrim{position:fixed;inset:0;z-index:40;background:rgba(8,12,22,.62);
  backdrop-filter:blur(4px);display:flex;align-items:flex-end;animation:fade .2s}
@keyframes fade{from{opacity:0}}
.sheet{background:linear-gradient(180deg,var(--surface-solid),#0c1120);
  width:100%;max-width:680px;margin:0 auto;
  border:1px solid var(--line);border-bottom:none;
  border-radius:24px 24px 0 0;max-height:93vh;overflow-y:auto;
  padding:8px 17px calc(22px + env(safe-area-inset-bottom));
  animation:slup .3s cubic-bezier(.2,.85,.25,1);
  box-shadow:0 -16px 50px rgba(2,5,16,.6)}
@keyframes slup{from{transform:translateY(100%)}}
.grab{width:40px;height:4px;background:var(--line2);border-radius:3px;margin:9px auto 14px}
.sheet h2{font-size:20px;margin:4px 0 17px;font-weight:800;letter-spacing:-.2px}

.thumb{width:56px;height:56px;border-radius:13px;object-fit:cover;
  background:var(--surface2-solid);border:1px solid var(--line);
  flex:none;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--txt3)}
.thumb.lg{width:100%;height:180px;border-radius:16px;object-fit:cover}
.photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photogrid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;border:1px solid var(--line)}

.step{background:var(--surface2);border:1px solid var(--line);border-radius:15px;
  padding:13px;margin-bottom:11px;backdrop-filter:blur(10px);
  box-shadow:0 4px 16px rgba(2,5,16,.3)}
.step.done{opacity:.55}
.step.active{border-color:transparent;
  box-shadow:0 0 0 1.5px var(--c1),0 0 24px rgba(34,211,238,.3);
  background:linear-gradient(120deg,rgba(34,211,238,.08),rgba(124,92,255,.08))}
.stepnum{width:25px;height:25px;border-radius:8px;
  background:var(--grad);color:#fff;
  font-size:12px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:none;
  box-shadow:0 2px 8px rgba(91,140,255,.4)}
.check{width:30px;height:30px;border-radius:9px;border:2px solid var(--line2);flex:none;
  display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.check.on{background:var(--good);border-color:var(--good);color:#03171c;
  box-shadow:0 0 14px rgba(52,224,161,.5)}

.timer{font-variant-numeric:tabular-nums;font-size:16px;font-weight:800;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-.3px}
.statbox{background:var(--surface2);border:1px solid var(--line);border-radius:15px;
  padding:14px 10px;text-align:center;flex:1;min-width:0;backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.statbox .n{font-size:23px;font-weight:800;letter-spacing:-.5px}
.statbox .l{font-size:10.5px;color:var(--txt3);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-weight:700}

.empty{text-align:center;padding:54px 20px;color:var(--txt3)}
.empty .e{font-size:50px;margin-bottom:14px;
  filter:drop-shadow(0 4px 16px rgba(124,92,255,.4))}
.deltapos{color:var(--good)} .deltaneg{color:var(--bad)}
.divider{height:1px;background:var(--line);margin:16px 0}
.badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:8px;
  background:var(--surface2-solid);color:var(--txt2);border:1px solid var(--line)}

.gauge{height:8px;background:rgba(0,0,0,.35);border-radius:5px;overflow:hidden;margin-top:7px;
  border:1px solid var(--line)}
.gauge>div{height:100%;background:linear-gradient(90deg,#34e0a1,#22d3ee);transition:width .4s;
  box-shadow:0 0 10px rgba(52,224,161,.5)}
.gauge.low>div{background:linear-gradient(90deg,#f5b945,#ffd66e);box-shadow:0 0 10px rgba(245,185,69,.5)}
.gauge.crit>div{background:linear-gradient(90deg,#ff5d6c,#ff8a5d);box-shadow:0 0 10px rgba(255,93,108,.5)}

/* report stays light/print-friendly, with ceramic gradient header */
.report{background:#fff;color:#15171e;border-radius:18px;overflow:hidden;
  box-shadow:0 16px 50px rgba(2,5,16,.5)}
.report .rhead{background:linear-gradient(120deg,#0b1020,#1a1740 55%,#2a1a4d);color:#fff;padding:22px;position:relative;overflow:hidden}
.report .rhead::after{content:"";position:absolute;inset:0;
  background:radial-gradient(400px 200px at 90% -20%,rgba(34,211,238,.35),transparent 60%)}
.report .rbody{padding:19px}
.report h3{margin:0 0 4px;font-size:22px;font-weight:800;position:relative}
.report .rsec{margin:19px 0}
.report .rsec h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a90a3;margin:0 0 9px;font-weight:800}
.report table{width:100%;border-collapse:collapse;font-size:13px}
.report td{padding:7px 4px;border-bottom:1px solid #eef0f4}
.report .rgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.report .rgrid img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:10px}
.report .rstat{display:flex;gap:10px}
.report .rstat>div{flex:1;background:linear-gradient(160deg,#f5f7fb,#eef1f7);border-radius:12px;padding:11px;text-align:center}
.report .rstat .n{font-size:19px;font-weight:800;color:#1a1740}
.report .rstat .l{font-size:10px;color:#8a90a3;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-top:2px}

/* segmented toggle */
.seg{display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px}
.seg button{flex:1;padding:9px 0;border-radius:9px;font-size:14px;font-weight:700;color:var(--txt2)}
.seg button.on{background:var(--grad);color:#fff;box-shadow:0 3px 12px rgba(91,140,255,.35)}

/* calendar */
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.caldow{text-align:center;font-size:11px;font-weight:700;color:var(--txt3);padding:4px 0}
.caldow.sun{color:#ff8a93} .caldow.sat{color:#7aa7ff}
.calcell{aspect-ratio:1;border-radius:10px;border:1px solid transparent;
  display:flex;flex-direction:column;align-items:center;padding-top:5px;cursor:pointer;
  position:relative;transition:background .15s}
.calcell:active{background:var(--surface2)}
.calcell.today{border-color:var(--line2)}
.calcell.sel{background:var(--grad-soft);border-color:var(--c1)}
.caldate{font-size:13px;font-weight:700;color:var(--txt)}
.caldate.sun{color:#ff8a93} .caldate.sat{color:#7aa7ff}
.caldots{display:flex;gap:3px;margin-top:auto;margin-bottom:7px}
.caldot{width:5px;height:5px;border-radius:50%}
.calwx{display:flex;flex-direction:column;align-items:center;line-height:1;margin-top:1px}
.calwxic{font-size:13px}
.calpop{font-size:8px;font-weight:700;color:#7aa7ff;margin-top:1px}
.calcell{padding-top:4px}

/* vehicle timeline */
.timeline{position:relative;padding-left:6px}
.tlitem{display:flex;gap:12px;align-items:flex-start;margin-bottom:11px;position:relative}
.tlitem::before{content:"";position:absolute;left:5px;top:18px;bottom:-11px;width:2px;background:var(--line)}
.tlitem:last-child::before{display:none}
.tldot{width:12px;height:12px;border-radius:50%;background:var(--c2);flex:none;margin-top:6px;
  box-shadow:0 0 0 3px var(--bg),0 0 10px rgba(124,92,255,.5);z-index:1}
.tldot.coat{background:var(--gold);box-shadow:0 0 0 3px var(--bg),0 0 10px rgba(224,179,82,.6)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
"use strict";
var h = React.createElement;
var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef;

/* ===== category system (shared by chemicals + steps) ===== */
var CATS = [
  {k:"prewash", n:"프리워시", sub:["알칼리","중성","산성","스노우폼"]},
  {k:"shampoo", n:"카샴푸", sub:["중성","산성","고발수","클렌징"]},
  {k:"wheel",   n:"휠/타이어", sub:["휠클리너(산성)","휠클리너(중성)","타이어 드레싱"]},
  {k:"iron",    n:"철분제거", sub:["아이언리무버","폴아웃"]},
  {k:"clay",    n:"클레이", sub:["클레이바","클레이타올","루브리컨트"]},
  {k:"bugtar",  n:"벌레/타르", sub:["벌레제거","타르리무버"]},
  {k:"polish",  n:"광택", sub:["컴파운드","폴리시","글레이즈","올인원"]},
  {k:"coating", n:"코팅", sub:["세라믹","글래스코팅","무기물"]},
  {k:"lsp",     n:"LSP/물왁스", sub:["물왁스","스프레이실란트","왁스","퀵디테일러"]},
  {k:"glass",   n:"유리", sub:["유리세정","유막제거","발수코팅"]},
  {k:"interior",n:"실내", sub:["다목적(APC)","가죽","플라스틱/트림","패브릭"]},
  {k:"etc",     n:"기타", sub:["QD","워터스팟","하부","기타"]}
];
function catName(k){ var c=CATS.find(function(x){return x.k===k;}); return c?c.n:"기타"; }
function catSubs(k){ var c=CATS.find(function(x){return x.k===k;}); return c?c.sub:[]; }

/* 장비 대분류 (디테일링 쇼핑몰 공통 분류 기반). sub는 향후 세부타입 확장용 — 현재 UI 미사용 */
var EQUIP_CATS=[
  {k:"polisher", n:"폴리셔/광택기", sub:["로터리","듀얼액션(DA)","미니/나노","백업패드"]},
  {k:"pad",      n:"패드",         sub:["컴파운드(초벌)","폴리싱(중벌)","피니싱(마무리)","울패드","쿠션패드"]},
  {k:"towel",    n:"타월&워시미트", sub:["드라잉타월","버핑타월","다목적타월","유리타월","워시미트"]},
  {k:"applibrush",n:"어플&브러쉬",  sub:["어플리케이터","디테일브러시","휠브러시","레더브러시"]},
  {k:"tool",     n:"디테일링툴",    sub:["폼랜서/폼건","압축분무기","고압세척기","송풍기","스팀기"]},
  {k:"etc",      n:"기타",         sub:["버킷/그릿가드","조명","마스킹","보호장구","기타"]}
];
function equipCatName(k){var c=EQUIP_CATS.find(function(x){return x.k===k;});return c?c.n:"기타";}
// 레거시 평면 type → 새 대분류 키 매핑 (구버전 데이터 호환)
var EQUIP_LEGACY_MAP={
  "폴리셔/DA":"polisher","폼랜서/폼건":"tool","압축분무기":"tool","고압세척기":"tool",
  "워시미트/장갑":"towel","버킷":"etc","건조타올":"towel","어플리케이터":"applibrush",
  "브러시":"applibrush","송풍기":"tool","기타":"etc"
};
function equipCatOf(eq){
  if(!eq) return "etc";
  if(eq.cat) return eq.cat; // 신규 데이터
  return EQUIP_LEGACY_MAP[eq.type]||"etc"; // 레거시 type 폴백
}
var EQUIP_TYPES=["폴리셔/DA","폼랜서/폼건","압축분무기","고압세척기","워시미트/장갑","버킷","건조타올","어플리케이터","브러시","송풍기","기타"];

/* preset step library — standard detailing order (wheels→prewash→wash→decon→correct→protect→glass→interior→finish) */
var STEP_PRESETS=[
  {n:"휠&타이어", cat:"wheel", est:15, tags:["디테일"], eq:"브러시", hint:"가장 먼저 — 브레이크 분진"},
  {n:"프리린스", cat:"prewash", est:5, tags:["프리워시"], eq:"고압세척기", hint:"느슨한 오염물 제거"},

/* ===== IndexedDB ===== */
var DB=null;
var DBNAME=(window.DEMO_MODE?"detaillog_demo":"detaillog");
function openDB(){
  return new Promise(function(res,rej){
    var rq=indexedDB.open(DBNAME,2);
    rq.onupgradeneeded=function(e){
      var db=e.target.result;
      ["vehicles","chemicals","equipment","sessions","templates","kv"].forEach(function(s){
        if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:"id"});
      });
    };
    rq.onsuccess=function(e){DB=e.target.result;res(DB);};
    rq.onerror=function(e){rej(e);};
  });
}
function tx(s,m){return DB.transaction(s,m).objectStore(s);}
function dbAll(s){return new Promise(function(res){var o=[],c=tx(s,"readonly").openCursor();
  c.onsuccess=function(e){var cur=e.target.result;if(cur){o.push(cur.value);cur.continue();}else res(o);};});}
function dbPut(s,v){return new Promise(function(res){tx(s,"readwrite").put(v).onsuccess=function(){res(v);};});}
function dbDel(s,id){return new Promise(function(res){tx(s,"readwrite").delete(id).onsuccess=function(){res();};});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

function resizeImg(file,cb){
  var r=new FileReader();
  r.onload=function(){var img=new Image();img.onload=function(){
    var max=1280,w=img.width,hh=img.height;
    if(w>hh&&w>max){hh=Math.round(hh*max/w);w=max;}else if(hh>max){w=Math.round(w*max/hh);hh=max;}
    var cv=document.createElement("canvas");cv.width=w;cv.height=hh;
    cv.getContext("2d").drawImage(img,0,0,w,hh);cb(cv.toDataURL("image/jpeg",0.72));
  };img.src=r.result;};r.readAsDataURL(file);
}
// extract an image File from a paste/drop event; returns true if handled
function imageFromEvent(e,cb){
  var items=(e.clipboardData||e.dataTransfer||{}).items;
  if(items){
    for(var i=0;i<items.length;i++){
      if(items[i].type&&items[i].type.indexOf("image")===0){
        var f=items[i].getAsFile(); if(f){resizeImg(f,cb);return true;}
      }
    }
  }
  var files=(e.dataTransfer&&e.dataTransfer.files)||null;
  if(files&&files.length&&files[0].type.indexOf("image")===0){resizeImg(files[0],cb);return true;}
  // try pasted URL text
  var txt=(e.clipboardData||{}).getData&&e.clipboardData.getData("text");
  if(txt&&/^https?:\/\//.test(txt.trim())){ loadImgUrl(txt.trim(),cb); return true; }
  return false;
}

  img.onload=function(){
    var max=1280,w=img.width,hh=img.height;
    if(w>hh&&w>max){hh=Math.round(hh*max/w);w=max;}else if(hh>max){w=Math.round(w*max/hh);hh=max;}

function fmtClock(s){var m=Math.floor(s/60),ss=s%60;return (m<10?"0":"")+m+":"+(ss<10?"0":"")+ss;}
function fmtMin(s){return Math.round(s/60)+"분";}
function todayStr(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function won(n){return (n||0).toLocaleString("ko-KR")+"원";}

/* coating expiry: vehicle.coating = {type, date(YYYY-MM-DD), months} */
var COATING_TYPES=[
  {n:"세라믹 코팅",m:12},{n:"유리막 코팅",m:9},{n:"실란트",m:4},
  {n:"왁스",m:2},{n:"물왁스",m:1},{n:"발수코팅(유리)",m:3}
];
function coatingStatus(c){
  if(!c||!c.date||!c.months) return null;
  var start=new Date(c.date+"T00:00:00");
  var exp=new Date(start); exp.setMonth(exp.getMonth()+c.months);
  var now=new Date(); now.setHours(0,0,0,0);
  var daysLeft=Math.round((exp-now)/86400000);
  var total=c.months*30;
  var pct=Math.max(0,Math.min(100,Math.round((daysLeft/total)*100)));
  var state=daysLeft<0?"expired":daysLeft<=14?"soon":"ok";
  function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  return {daysLeft:daysLeft,expDate:fmt(exp),pct:pct,state:state};
}

/* ===== weather (Open-Meteo, no key, CORS ok) ===== */
function wmoIcon(code){
  if(code===0) return "☀️";
  if(code===1||code===2) return "🌤️";
  if(code===3) return "☁️";
  if(code===45||code===48) return "🌫️";
  if(code>=51&&code<=57) return "🌦️";
  if(code>=61&&code<=67) return "🌧️";
  if(code>=71&&code<=77) return "🌨️";
  if(code>=80&&code<=82) return "🌦️";
  if(code>=85&&code<=86) return "❄️";
  if(code>=95) return "⛈️";
  return "";
}
function wmoLabel(code){
  if(code===0) return "맑음";
  if(code===1||code===2) return "구름 조금";
  if(code===3) return "흐림";
  if(code===45||code===48) return "안개";
  if(code>=51&&code<=57) return "이슬비";
  if(code>=61&&code<=67) return "비";
  if(code>=71&&code<=77) return "눈";
  if(code>=80&&code<=82) return "소나기";
  if(code>=85&&code<=86) return "눈";
  if(code>=95) return "뇌우";
  return "";
}
// returns {byDate:{date:{code,tmax,tmin,pop}}, lat, lng, fetchedAt} or null
function kvGet(key){return new Promise(function(res){var rq=tx("kv","readonly").get(key);rq.onsuccess=function(){res(rq.result||null);};rq.onerror=function(){res(null);};});}
function kvPut(key,val){return new Promise(function(res){var rq=tx("kv","readwrite").put({id:key,val:val});rq.onsuccess=function(){res();};rq.onerror=function(){res();};});}

function getWeather(force){
  // cache 3h
  return kvGet("weather").then(function(cached){
    if(!force&&cached&&cached.val&&(Date.now()-cached.val.fetchedAt<3*3600*1000)){
      return cached.val;
    }
    if(!navigator.geolocation) return Promise.reject(new Error("nogeo"));
    return new Promise(function(resolve,reject){
      navigator.geolocation.getCurrentPosition(function(p){
        var lat=p.coords.latitude,lng=p.coords.longitude;
        var url="https://api.open-meteo.com/v1/forecast?latitude="+lat.toFixed(3)+"&longitude="+lng.toFixed(3)+
          "&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=16";
        fetch(url).then(function(r){return r.json();}).then(function(j){
          if(!j.daily||!j.daily.time){reject(new Error("nodata"));return;}
          var byDate={};
          j.daily.time.forEach(function(d,i){
            byDate[d]={code:j.daily.weather_code[i],tmax:Math.round(j.daily.temperature_2m_max[i]),
              tmin:Math.round(j.daily.temperature_2m_min[i]),pop:j.daily.precipitation_probability_max[i]};
          });
          var data={byDate:byDate,lat:lat,lng:lng,fetchedAt:Date.now()};
          kvPut("weather",data).then(function(){resolve(data);});
        }).catch(reject);
      },function(err){reject(err);},{timeout:10000,maximumAge:600000});
    });
  });
}

/* ---------------- SESSION RUN ---------------- */
function SessionRun(props){
  var s=props.s,ctx=props.ctx;
  var tick=useState(0),setTick=tick[1];
  var editStep=useState(null);
  var pickPreset=useState(false);
  var showReport=useState(false);

  useEffect(function(){
    var iv=setInterval(function(){
      if(s.runningStepId){
        setTick(Date.now());
        // auto-advance: if all-in-one mode and current step exceeded its estimate, complete & move on
        if(s.autoMode){
          var cur=s.steps.find(function(x){return x.id===s.runningStepId;});
          if(cur&&cur.estMin>0&&cur._startedAt){
            var elapsed=(cur.actualSec||0)+Math.round((Date.now()-cur._startedAt)/1000);
            if(elapsed>=cur.estMin*60){ advanceAuto(); }
          }
        }
      }
    },1000);
    function vis(){if(!document.hidden)setTick(Date.now());}
    document.addEventListener("visibilitychange",vis);
    return function(){clearInterval(iv);document.removeEventListener("visibilitychange",vis);};
  },[s.runningStepId,s.autoMode]);

  function save(ns){return dbPut("sessions",ns).then(ctx.reload);}
  function patch(o){save(Object.assign({},s,o));}

  // commit current running step's elapsed time into actualSec, return updated steps
  function commitRunning(steps){
    return steps.map(function(x){
      if(x.id===s.runningStepId&&x._startedAt){x.actualSec=(x.actualSec||0)+Math.round((Date.now()-x._startedAt)/1000);x._startedAt=null;}
      return x;});
  }
  function firstPendingId(steps,afterId){
    var started=!afterId;
    for(var i=0;i<steps.length;i++){
      if(afterId&&steps[i].id===afterId){started=true;continue;}
      if(started&&!steps[i].done) return steps[i].id;
    }
    return null;
  }
  // auto mode: complete current, start next pending; if none, finish
  function advanceAuto(){
    var steps=commitRunning(s.steps.slice());
    steps=steps.map(function(x){if(x.id===s.runningStepId)x.done=true;return x;});
    var nextId=firstPendingId(steps,s.runningStepId);
    if(nextId){
      steps=steps.map(function(x){if(x.id===nextId)x._startedAt=Date.now();return x;});
      save(Object.assign({},s,{steps:steps,runningStepId:nextId,status:"running"}));
    }else{
      save(Object.assign({},s,{steps:steps,runningStepId:null,autoMode:false}));
    }
  }
  // start all-in-one from first pending
  function startAuto(){
    var steps=commitRunning(s.steps.slice());
    var firstId=firstPendingId(steps,null);
    if(!firstId){alert("진행할 스텝이 없어요");return;}
    steps=steps.map(function(x){if(x.id===firstId)x._startedAt=Date.now();return x;});
    save(Object.assign({},s,{steps:steps,runningStepId:firstId,status:"running",autoMode:true}));
  }
  function pauseAuto(){
    var steps=commitRunning(s.steps.slice());
    save(Object.assign({},s,{steps:steps,runningStepId:null,autoMode:false}));
  }

  function startStep(st){
    var steps=s.steps.map(function(x){
      if(x.id===s.runningStepId&&x._startedAt){x.actualSec=(x.actualSec||0)+Math.round((Date.now()-x._startedAt)/1000);x._startedAt=null;}
      return x;});
    var ns=steps.map(function(x){if(x.id===st.id)x._startedAt=Date.now();return x;});
    save(Object.assign({},s,{steps:ns,runningStepId:st.id,status:"running"}));
  }
  function stopStep(){
    var steps=s.steps.map(function(x){
      if(x.id===s.runningStepId&&x._startedAt){x.actualSec=(x.actualSec||0)+Math.round((Date.now()-x._startedAt)/1000);x._startedAt=null;}
      return x;});
    save(Object.assign({},s,{steps:steps,runningStepId:null}));
  }
  function toggleDone(st){
    if(s.runningStepId===st.id)stopStep();
    var steps=s.steps.map(function(x){if(x.id===st.id)x.done=!x.done;return x;});
    save(Object.assign({},s,{steps:steps}));
  }
  function liveSecs(st){var b=st.actualSec||0;if(st._startedAt)b+=Math.round((Date.now()-st._startedAt)/1000);return b;}
  function addStep(st){save(Object.assign({},s,{steps:s.steps.concat([st])}));}
  function updStep(st){save(Object.assign({},s,{steps:s.steps.map(function(x){return x.id===st.id?st:x;})}));}
  function delStep(id){save(Object.assign({},s,{steps:s.steps.filter(function(x){return x.id!==id;})}));}
  function delSession(){if(confirm("이 세션을 삭제할까요?"))dbDel("sessions",s.id).then(ctx.reload).then(function(){ctx.setOpen(null);});}

  function saveAsTemplate(){
    var name=prompt("템플릿 이름",s.title);if(!name)return;
    var t={id:uid(),name:name,steps:s.steps.map(function(x){
      return {id:uid(),name:x.name,cat:x.cat||"",chemIds:x.chemIds||[],equipIds:x.equipIds||[],
        dilution:x.dilution||"",estMin:x.estMin||0,panel:x.panel||"",tags:x.tags||[],usedMl:x.usedMl||0};
    })};
    dbPut("templates",t).then(ctx.reload).then(function(){alert("템플릿으로 저장됐어요");});
  }

  function completeSession(){
    if(s.runningStepId)stopStep();
    // deduct chemical volumes
    var deltas={};
    s.steps.forEach(function(st){
      (st.chemIds||[]).forEach(function(cid){
        if(st.usedMl>0){ deltas[cid]=(deltas[cid]||0)+st.usedMl/((st.chemIds||[]).length||1); }
      });
    });
    var ops=Object.keys(deltas).map(function(cid){
      var c=ctx.chem.find(function(x){return x.id===cid;});
      if(!c)return Promise.resolve();
      var rem=Math.max(0,(c.remainMl!=null?c.remainMl:c.volMl||0)-deltas[cid]);
      return dbPut("chemicals",Object.assign({},c,{remainMl:rem}));
    });
    // increment equipment usage counts (each unique equipment used in this session = +1)
    if(!s._equipCounted){
      var equipSet={};
      s.steps.forEach(function(st){(st.equipIds||[]).forEach(function(eid){equipSet[eid]=true;});});
      Object.keys(equipSet).forEach(function(eid){
        var eq=ctx.equip.find(function(x){return x.id===eid;});
        if(eq) ops.push(dbPut("equipment",Object.assign({},eq,{uses:(eq.uses||0)+1})));
      });
    }
    Promise.all(ops).then(function(){ patch({status:"done",_deducted:true,_equipCounted:true}); ctx.reload(); });
  }

  function addStepPhoto(stId,file){
    resizeImg(file,function(d){
      var ns=s.steps.map(function(x){if(x.id===stId){x.photos=(x.photos||[]).concat([d]);}return x;});
      save(Object.assign({},s,{steps:ns}));
    });
  }
  function rmStepPhoto(stId,idx){
    var ns=s.steps.map(function(x){if(x.id===stId){x.photos=(x.photos||[]).slice();x.photos.splice(idx,1);}return x;});
    save(Object.assign({},s,{steps:ns}));
  }

  var totalEst=s.steps.reduce(function(a,b){return a+(b.estMin||0)*60;},0);
  var totalAct=s.steps.reduce(function(a,b){return a+liveSecs(b);},0);
  var doneCt=s.steps.filter(function(x){return x.done;}).length;

  if(showReport[0]) return h(Report,{s:s,ctx:ctx,close:function(){showReport[1](false);}});

  return h("div",null,
    h("header",null,
      h("button",{className:"hbtn",onClick:function(){if(s.runningStepId)pauseAuto();ctx.setOpen(null);}},"‹"),
      h("h1",{className:"ellip"},s.title),
      h("button",{className:"hbtn",onClick:saveAsTemplate,title:"템플릿 저장"},"📋")),
    h("main",null,
      h("div",{className:"row",style:{gap:8,marginBottom:12}},
        h("div",{className:"statbox"},h("div",{className:"n"},doneCt+"/"+s.steps.length),h("div",{className:"l"},"단계")),
        h("div",{className:"statbox"},h("div",{className:"n timer"},fmtClock(totalAct)),h("div",{className:"l"},"실제")),
        h("div",{className:"statbox"},h("div",{className:"n",style:{color:"var(--txt2)"}},Math.round(totalEst/60)+"분"),h("div",{className:"l"},"예상"))),

      // all-in-one control bar
      s.steps.length>0&&s.status!=="done"&&h("div",{className:"card",style:{padding:13,marginBottom:14,background:s.autoMode?"linear-gradient(120deg,rgba(34,211,238,.1),rgba(124,92,255,.1))":"var(--surface)"}},
        h("div",{className:"row between"},
          h("div",{className:"grow"},
            h("div",{style:{fontWeight:800,fontSize:14}},s.autoMode?"🔄 올인원 자동 진행 중":"⚡ 올인원 모드"),
            h("div",{className:"tiny",style:{marginTop:2}},s.autoMode?"예상시간이 차면 자동으로 다음 스텝":"전체 타이머가 스텝을 순서대로 자동 진행")),
          s.autoMode
            ? h("div",{className:"row",style:{gap:8}},
                h("button",{className:"btn sm",onClick:advanceAuto},"다음 ⏭"),
                h("button",{className:"btn ghost sm",onClick:pauseAuto},"일시정지"))
            : h("button",{className:"btn sm",onClick:startAuto},"▶ 시작")),
        s.autoMode&&(function(){
          var cur=s.steps.find(function(x){return x.id===s.runningStepId;});
          if(!cur||!cur.estMin)return null;
          var el=liveSecs(cur),tot=cur.estMin*60,pct=Math.min(100,Math.round(el/tot*100));
          return h("div",null,
            h("div",{className:"row between",style:{marginTop:10,marginBottom:4}},
              h("span",{className:"tiny"},"현재: "+cur.name),
              h("span",{className:"tiny timer"},fmtClock(el)+" / "+Math.round(tot/60)+"분")),
            h("div",{className:"gauge"},h("div",{style:{width:pct+"%"}})));
        })()),

      s.steps.length===0&&h("div",{className:"empty"},h("div",{className:"e"},"➕"),"스텝을 추가해 플랜을 짜보세요"),
      s.steps.map(function(st,i){
        return h(StepCard,{key:st.id,st:st,i:i,ctx:ctx,
          live:liveSecs(st),running:s.runningStepId===st.id,
          onEdit:function(){editStep[1](st);},onToggle:function(){toggleDone(st);},
          onStart:function(){startStep(st);},onStop:stopStep,
          onAddPhoto:function(f){addStepPhoto(st.id,f);},onRmPhoto:function(idx){rmStepPhoto(st.id,idx);}});
      }),

      h("button",{className:"btn ghost",style:{marginTop:6},onClick:function(){pickPreset[1](true);}},"＋ 스텝 추가"),

      h("div",{className:"divider"}),
      h(SessionMeta,{s:s,patch:patch}),
      h("div",{className:"divider"}),
      h(ReviewBlock,{s:s,patch:patch}),

      h("div",{style:{height:14}}),
      s.status==="done"&&h("button",{className:"btn",style:{marginBottom:10,background:"var(--gold)",color:"#1a1300"},onClick:function(){showReport[1](true);}},"📄 세차 리포트 보기"),
      s.status!=="done"
        ? h("button",{className:"btn",onClick:completeSession},"✓ 세차 완료 (케미컬 차감)")
        : h("button",{className:"btn ghost",onClick:function(){patch({status:"plan"});}},"완료 취소"),
      h("button",{className:"btn ghost danger",style:{marginTop:10},onClick:delSession},"세션 삭제"),
      h("div",{style:{height:30}})),
    editStep[0]&&h(StepEditor,{ctx:ctx,step:editStep[0],
      close:function(){editStep[1](null);},
      onSave:function(st){if(st._new){delete st._new;addStep(st);}else updStep(st);editStep[1](null);},
      onDelete:function(id){delStep(id);editStep[1](null);}}),
    pickPreset[0]&&h(PresetPicker,{ctx:ctx,
      close:function(){pickPreset[1](false);},
      onCustom:function(){pickPreset[1](false);
        editStep[1]({_new:true,id:uid(),name:"",cat:"",chemIds:[],equipIds:[],dilution:"",tools:"",estMin:0,panel:"",tags:[],usedMl:0,done:false,actualSec:0,_startedAt:null});},
      onPick:function(p){pickPreset[1](false);
        // try to auto-match a chemical of same category, and equipment of hinted type
        var chem=ctx.chem.find(function(c){return c.cat===p.cat;});
        var eq=p.eq?ctx.equip.find(function(e){return e.type===p.eq;}):null;
        editStep[1]({_new:true,id:uid(),name:p.n,cat:p.cat,chemIds:chem?[chem.id]:[],
          equipIds:eq?[eq.id]:[],dilution:"",tools:"",estMin:p.est||0,panel:"",tags:(p.tags||[]).slice(),
          usedMl:chem&&chem.defaultMl?chem.defaultMl:0,done:false,actualSec:0,_startedAt:null});}}));
}

      a.href=url; a.download="detaillog-backup-"+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+".json";

      busy[1](true);
      // clear then write
      var clearOps=STORES.map(function(s){
        return new Promise(function(res){var st=tx(s,"readwrite");st.clear().onsuccess=function(){res();};});

    })).then(function(){return ctx.reload();}).then(function(){busy[1](false);alert("삭제 완료");props.close();});

  var totals={v:ctx.veh.length,c:ctx.chem.length,e:ctx.equip.length,s:ctx.sess.length};

        h("div",{className:"statbox"},h("div",{className:"n"},totals.c),h("div",{className:"l"},"케미컬")),
        h("div",{className:"statbox"},h("div",{className:"n"},totals.e),h("div",{className:"l"},"장비")),
        h("div",{className:"statbox"},h("div",{className:"n"},totals.s),h("div",{className:"l"},"세션")))),

    h("div",{key:"bk",className:"sectit",style:{marginTop:18}},"백업"),
    h("div",{key:"bkh",className:"tiny",style:{marginBottom:10}},"모든 데이터(사진 포함)를 JSON 파일 하나로 내보내요. 구글 드라이브·메일 등에 보관하면 기기를 바꿔도 안전해요."),
    h("button",{key:"exp",className:"btn",onClick:exportData},"⤓ 백업 파일 내보내기"),

/* ---------------- DILUTION CALCULATOR ---------------- */
var VOLUME_PRESETS=[
  {n:"스프레이 500ml", ml:500},{n:"스프레이 750ml", ml:750},
  {n:"폼랜서 1L", ml:1000},{n:"버킷 8L", ml:8000},
  {n:"버킷 12L", ml:12000},{n:"버킷 20L", ml:20000}
];
// ratio "X:1" → parts. basis 'total': dose = total/(X+1). basis 'water': dose = total/(X+1) too for water:conc,
// but we model water-basis as conc = total/(ratio+1) with water = total*ratio/(ratio+1). For total-basis,
// conc = total/ratio (ratio parts total). We expose both clearly.
function calcDilution(ratioX, totalMl, basis){
  if(!ratioX||ratioX<=0||!totalMl||totalMl<=0) return null;
  var conc, water;
  if(basis==="total"){ // ratioX parts total, 1 part conc
    conc = totalMl / ratioX;
  }else{ // water basis: ratioX parts water : 1 part conc → total = ratioX+1 parts
    conc = totalMl / (ratioX + 1);
  }
  water = totalMl - conc;
  return {conc:conc, water:water};
}
function fmtMl(ml){
  if(ml>=1000) return (Math.round(ml/10)/100)+" L";
  return (Math.round(ml*10)/10)+" ml";
}
function DilutionCalc(props){ // props: close, initialRatio, onApply(optional)
  var ratioStr=useState(props.initialRatio||""), total=useState(1000), basis=useState("total");
  // parse ratio: accepts "200:1", "1:200", "200", "5%"
  function parseRatio(str){
    str=(str||"").trim();
    if(!str) return null;
    if(str.indexOf("%")>=0){ var pct=parseFloat(str); if(pct>0&&pct<100) return (100/pct)-1>0?(100/pct):null; }
    if(str.indexOf(":")>=0){
      var a=str.split(":"), p=parseFloat(a[0]), q=parseFloat(a[1]);
      if(p>0&&q>0){ return p>=q ? p/q : q/p; } // normalize to "X:1" where X is the big side
    }
    var n=parseFloat(str); return n>0?n:null;
  }
  var ratioX=parseRatio(ratioStr[0]);
  var res=ratioX?calcDilution(ratioX, parseFloat(total[0]), basis[0]):null;

  return h(Sheet,{close:props.close,title:"희석 계산기",children:[
    h("label",{className:"fl",key:1},"희석비"),
    h("div",{key:"rq",className:"chips",style:{marginBottom:9}},
      ["256:1","200:1","100:1","50:1","20:1","10:1","4:1","1:1"].map(function(r){
        return h("span",{key:r,className:"chip"+(ratioStr[0]===r?" on":""),onClick:function(){ratioStr[1](r);}},r);})),
    h("input",{key:2,className:"inp",placeholder:"예: 200:1, 1:200, 또는 5%",value:ratioStr[0],onChange:function(e){ratioStr[1](e.target.value);}}),

    h("label",{className:"fl",key:3},"해석 기준"),
    h("div",{key:"bt",className:"seg"},
      h("button",{className:basis[0]==="total"?"on":"",onClick:function(){basis[1]("total");}},"전체 기준"),
      h("button",{className:basis[0]==="water"?"on":"",onClick:function(){basis[1]("water");}},"물 기준")),
    h("div",{key:"bh",className:"tiny",style:{marginTop:6}},
      basis[0]==="total"?"200:1 = 전체 200에 원액 1 (디테일링 표준)":"200:1 = 물 200에 원액 1"),

    h("label",{className:"fl",key:4},"만들 총량"),
    h("div",{key:"vq",className:"chips",style:{marginBottom:9}},VOLUME_PRESETS.map(function(v){
      return h("span",{key:v.n,className:"chip"+(parseFloat(total[0])===v.ml?" on":""),onClick:function(){total[1](v.ml);}},v.n);})),
    h("div",{key:"vr",className:"row",style:{gap:8}},
      h("input",{className:"inp",type:"number",inputMode:"numeric",value:total[0],onChange:function(e){total[1](e.target.value);}}),
      h("div",{style:{display:"flex",alignItems:"center",color:"var(--txt2)",fontWeight:700,padding:"0 4px"}},"ml")),

    res&&h("div",{key:"res",className:"card",style:{marginTop:16,background:"var(--surface2)"}},
      h("div",{className:"row between",style:{marginBottom:10}},
        h("div",null,h("div",{className:"tiny"},"원액"),
          h("div",{style:{fontSize:26,fontWeight:800,color:"var(--accent)"}},fmtMl(res.conc))),
        h("div",{style:{textAlign:"right"}},h("div",{className:"tiny"},"물"),
          h("div",{style:{fontSize:26,fontWeight:800}},fmtMl(res.water)))),
      h("div",{style:{height:8,borderRadius:4,overflow:"hidden",display:"flex",border:"1px solid var(--line)"}},
        h("div",{style:{width:Math.max(2,res.conc/parseFloat(total[0])*100)+"%",background:"var(--grad)"}}),
        h("div",{style:{flex:1,background:"rgba(91,140,255,.15)"}})),
      h("div",{className:"tiny",style:{marginTop:8,textAlign:"center"}},
        "총 "+fmtMl(parseFloat(total[0]))+" 기준 · 원액 "+Math.round(res.conc/parseFloat(total[0])*1000)/10+"%")),

    props.onApply&&ratioStr[0]&&h("button",{key:"ap",className:"btn",style:{marginTop:14},
      onClick:function(){props.onApply(ratioStr[0], res?Math.round(res.conc):0);}},"이 희석비를 스텝에 적용"),
    h("div",{key:"sp",style:{height:10}})
  ]});
}

/* ---------------- LEAFLET MAP ---------------- */
function LeafletMap(props){ // props: lat, lng, height, interactive
  var ref=useRef(null), mapRef=useRef(null), failed=useState(false);
  useEffect(function(){
    if(typeof L==="undefined"){ failed[1](true); return; }
    if(!ref.current||mapRef.current) return;
    try{
      var map=L.map(ref.current,{
        zoomControl:!!props.interactive, dragging:!!props.interactive,
        scrollWheelZoom:false, doubleClickZoom:!!props.interactive,
        attributionControl:false
      }).setView([props.lat,props.lng],15);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(map);
      L.circleMarker([props.lat,props.lng],{radius:9,color:"#22d3ee",weight:3,fillColor:"#5b8cff",fillOpacity:.9}).addTo(map);
      mapRef.current=map;
      // ensure correct sizing after layout
      setTimeout(function(){ try{map.invalidateSize();}catch(e){} },200);
    }catch(e){ failed[1](true); }
    return function(){ if(mapRef.current){ try{mapRef.current.remove();}catch(e){} mapRef.current=null; } };
  },[props.lat,props.lng]);

  if(failed[0]) return h("div",{className:"tiny",style:{padding:"8px 0"}},"지도를 불러올 수 없어요 · 좌표 "+props.lat.toFixed(5)+", "+props.lng.toFixed(5));
  return h("div",{ref:ref,style:{width:"100%",height:(props.height||180)+"px",borderRadius:12,overflow:"hidden",border:"1px solid var(--line)"}});
}
